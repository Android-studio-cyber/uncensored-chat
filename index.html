<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <title>Чат с HF</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            display: flex;
            position: fixed;
            width: 100%;
            height: 100%;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        .sidebar {
            width: 280px;
            background: #0f1420;
            border-right: 1px solid #0f3460;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 15px;
            border-bottom: 1px solid #0f3460;
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .new-chat-btn:hover,
        .new-chat-btn:active {
            background: #c73652;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            -webkit-overflow-scrolling: touch;
        }

        .chat-item {
            padding: 12px;
            margin-bottom: 6px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            transition: background 0.2s;
            background: transparent;
        }

        .chat-item:hover,
        .chat-item:active {
            background: #16213e;
        }

        .chat-item.active {
            background: #16213e;
            border-left: 3px solid #e94560;
        }

        .chat-item-title {
            flex: 1;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-item-actions {
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .chat-item:hover .chat-item-actions,
        .chat-item:focus-within .chat-item-actions {
            opacity: 1;
        }

        .chat-item-btn {
            background: transparent;
            border: none;
            color: #888;
            cursor: pointer;
            padding: 6px 8px;
            font-size: 1rem;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .chat-item-btn:hover,
        .chat-item-btn:active {
            color: #e94560;
            background: rgba(233, 69, 96, 0.1);
        }

        .empty-list {
            text-align: center;
            color: #666;
            padding: 20px;
            font-size: 0.85rem;
            font-style: italic;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .header {
            background: #16213e;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #0f3460;
            flex-shrink: 0;
        }

        .menu-toggle {
            display: none;
            background: transparent;
            border: none;
            color: #eee;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 6px;
            line-height: 1;
        }

        .menu-toggle:active {
            background: #1a1a2e;
        }

        .header h1 {
            font-size: 1.1rem;
            color: #e94560;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message.user {
            align-self: flex-end;
            background: #e94560;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: #0f3460;
            border-bottom-left-radius: 4px;
        }

        .message.loading {
            align-self: flex-start;
            background: #0f3460;
            border-bottom-left-radius: 4px;
            opacity: 0.7;
        }

        .input-area {
            background: #16213e;
            padding: 15px 20px;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
            display: flex;
            gap: 10px;
            border-top: 1px solid #0f3460;
            flex-shrink: 0;
        }

        #userInput {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #0f3460;
            border-radius: 24px;
            background: #1a1a2e;
            color: #eee;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
            -webkit-appearance: none;
            appearance: none;
        }

        #userInput:focus {
            border-color: #e94560;
        }

        #sendBtn {
            padding: 12px 24px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: background 0.3s;
            white-space: nowrap;
        }

        #sendBtn:hover,
        #sendBtn:active {
            background: #c73652;
        }

        #sendBtn:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .error {
            color: #ff6b6b;
            font-style: italic;
        }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 99;
        }

        .overlay.show {
            display: block;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100%;
                z-index: 100;
                transform: translateX(-100%);
                box-shadow: 2px 0 15px rgba(0, 0, 0, 0.5);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .menu-toggle {
                display: block;
            }

            .header {
                padding: 12px 15px;
            }

            .header h1 {
                font-size: 1rem;
            }

            .chat-container {
                padding: 12px;
                gap: 10px;
            }

            .message {
                max-width: 88%;
                padding: 10px 14px;
                font-size: 0.95rem;
            }

            .input-area {
                padding: 12px 15px;
            }

            #userInput {
                padding: 10px 14px;
            }

            #sendBtn {
                padding: 10px 18px;
                font-size: 0.95rem;
            }

            .chat-item {
                padding: 14px 12px;
            }

            .chat-item-actions {
                opacity: 1;
            }

            .new-chat-btn {
                padding: 14px;
                font-size: 1rem;
            }
        }

        @media (max-width: 380px) {
            .message {
                max-width: 92%;
                font-size: 0.9rem;
            }

            .header h1 {
                font-size: 0.95rem;
            }

            #sendBtn {
                padding: 10px 14px;
                font-size: 0.9rem;
            }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            .header {
                padding: 8px 12px;
            }

            .input-area {
                padding: 8px 12px;
            }

            .chat-container {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="overlay" id="overlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" id="newChatBtn">
                <span>＋</span> Новый чат
            </button>
        </div>
        <div class="chat-list" id="chatList"></div>
    </aside>

    <div class="main">
        <div class="header">
            <button class="menu-toggle" id="menuToggle" aria-label="Меню">☰</button>
            <h1 id="chatTitle">💬 Новый чат</h1>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="message assistant">Привет! Задай мне вопрос.</div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Введите сообщение..." autocomplete="off">
            <button id="sendBtn">Отправить</button>
        </div>
    </div>

    <script>
        const HF_TOKEN = "{{OPENROUTER}}";
        const API_URL = "https://openrouter.ai/api/v1/chat/completions";
        const MODEL = "meta-llama/llama-3.2-3b-instruct:free";
        const STORAGE_KEY = "hf_chats_v1";
        const chatContainer = document.getElementById("chatContainer");
        const userInput = document.getElementById("userInput");
        const sendBtn = document.getElementById("sendBtn");
        const chatList = document.getElementById("chatList");
        const newChatBtn = document.getElementById("newChatBtn");
        const chatTitle = document.getElementById("chatTitle");
        const menuToggle = document.getElementById("menuToggle");
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("overlay");

        let chats = [];
        let activeChatId = null;

        function saveChats() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({
                chats: chats,
                activeChatId: activeChatId
            }));
        }

        function loadChats() {
            try {
                const data = JSON.parse(localStorage.getItem(STORAGE_KEY));
                if (data && Array.isArray(data.chats)) {
                    chats = data.chats;
                    activeChatId = data.activeChatId;
                }
            } catch (e) {
                console.error("Ошибка загрузки чатов:", e);
            }
        }

        function createChat() {
            const id = "chat_" + Date.now() + "_" + Math.random().toString(36).slice(2, 7);
            chats.unshift({ id: id, title: "Новый чат", messages: [], createdAt: Date.now() });
            activeChatId = id;
            saveChats();
            renderChatList();
            renderChat();
            closeSidebarMobile();
        }

        function switchChat(id) {
            if (activeChatId === id) return;
            activeChatId = id;
            saveChats();
            renderChatList();
            renderChat();
            closeSidebarMobile();
        }

        function deleteChat(id) {
            if (!confirm("Удалить этот чат?")) return;
            chats = chats.filter(c => c.id !== id);
            if (activeChatId === id) {
                activeChatId = chats.length > 0 ? chats[0].id : null;
            }
            if (!activeChatId) {
                createChat();
                return;
            }
            saveChats();
            renderChatList();
            renderChat();
        }

        function renameChat(id) {
            const chat = chats.find(c => c.id === id);
            if (!chat) return;
            const newTitle = prompt("Новое название чата:", chat.title);
            if (newTitle && newTitle.trim()) {
                chat.title = newTitle.trim();
                saveChats();
                renderChatList();
                if (id === activeChatId) updateHeader();
            }
        }

        function getActiveChat() {
            return chats.find(c => c.id === activeChatId);
        }

        function renderChatList() {
            chatList.innerHTML = "";
            if (chats.length === 0) {
                chatList.innerHTML = '<div class="empty-list">Нет чатов</div>';
                return;
            }
            chats.forEach(chat => {
                const item = document.createElement("div");
                item.className = "chat-item" + (chat.id === activeChatId ? " active" : "");
                item.innerHTML = `
                    <span class="chat-item-title" title="${escapeHtml(chat.title)}">${escapeHtml(chat.title)}</span>
                    <div class="chat-item-actions">
                        <button class="chat-item-btn" data-action="rename" title="Переименовать">✎</button>
                        <button class="chat-item-btn" data-action="delete" title="Удалить">✕</button>
                    </div>
                `;
                item.addEventListener("click", (e) => {
                    const action = e.target.dataset.action;
                    if (action === "delete") {
                        e.stopPropagation();
                        deleteChat(chat.id);
                    } else if (action === "rename") {
                        e.stopPropagation();
                        renameChat(chat.id);
                    } else {
                        switchChat(chat.id);
                    }
                });
                chatList.appendChild(item);
            });
        }

        function renderChat() {
            chatContainer.innerHTML = "";
            const chat = getActiveChat();
            updateHeader();

            if (!chat || chat.messages.length === 0) {
                const div = document.createElement("div");
                div.className = "message assistant";
                div.textContent = "Привет! Задай мне вопрос.";
                chatContainer.appendChild(div);
                return;
            }

            chat.messages.forEach(msg => {
                if (msg.role === "system") return;
                addMessageToDOM(msg.role, msg.content);
            });
        }

        function updateHeader() {
            const chat = getActiveChat();
            chatTitle.textContent = chat ? "💬 " + chat.title : "💬 Чат";
        }

        function addMessageToDOM(role, text, isError = false) {
            const div = document.createElement("div");
            div.className = `message ${role}${isError ? " error" : ""}`;
            div.textContent = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        function escapeHtml(str) {
            const div = document.createElement("div");
            div.textContent = str;
            return div.innerHTML;
        }

        function cleanResponse(text) {
            const thinkEndIndex = text.indexOf('</think>');
            if (thinkEndIndex !== -1) {
                text = text.substring(thinkEndIndex + '</think>'.length);
            }
            text = text.replace(/<think>[\s\S]*?<\/think>/g, '');
            text = text.replace(/<think>/g, '');
            return text.trim();
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            let chat = getActiveChat();
            if (!chat) {
                createChat();
                chat = getActiveChat();
            }

            userInput.value = "";
            sendBtn.disabled = true;

            if (chat.messages.length === 0) {
                chat.title = text.slice(0, 40) + (text.length > 40 ? "..." : "");
                renderChatList();
                updateHeader();
            }

            addMessageToDOM("user", text);
            chat.messages.push({ role: "user", content: text });

            const loadingMsg = addMessageToDOM("loading", "Думаю...");

            try {
                const apiMessages = [
                    {
                        role: "system",
                        content: "Отвечай напрямую на вопросы пользователя. Не показывай свои внутренние размышления или процесс обдумывания. Давай сразу готовый ответ без тегов <think>."
                    },
                    ...chat.messages
                ];

                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${HF_TOKEN}`
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: apiMessages,
                        max_tokens: 2048,
                        temperature: 0.7
                    })
                });

                loadingMsg.remove();

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(`Ошибка API (${response.status}): ${errText}`);
                }

                const data = await response.json();
                let reply = data.choices[0].message.content;
                reply = cleanResponse(reply);

                addMessageToDOM("assistant", reply);
                chat.messages.push({ role: "assistant", content: reply });
                saveChats();

            } catch (error) {
                loadingMsg.remove();
                addMessageToDOM("assistant", `Ошибка: ${error.message}`, true);
            } finally {
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        function closeSidebarMobile() {
            sidebar.classList.remove("open");
            overlay.classList.remove("show");
        }

        menuToggle.addEventListener("click", () => {
            sidebar.classList.toggle("open");
            overlay.classList.toggle("show");
        });

        overlay.addEventListener("click", closeSidebarMobile);

        newChatBtn.addEventListener("click", createChat);
        sendBtn.addEventListener("click", sendMessage);
        userInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !sendBtn.disabled) sendMessage();
        });

        loadChats();
        if (chats.length === 0) {
            createChat();
        } else {
            if (!activeChatId || !chats.find(c => c.id === activeChatId)) {
                activeChatId = chats[0].id;
            }
            renderChatList();
            renderChat();
        }
    </script>
</body>
</html>
